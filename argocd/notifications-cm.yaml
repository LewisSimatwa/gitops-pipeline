# ─────────────────────────────────────────────────────────────────────────────
# ArgoCD Notifications — Slack integration.
#
# Apply after ArgoCD is installed:
#   kubectl apply -f argocd/notifications-cm.yaml -n argocd
#
# The Slack bot token is stored in the argocd-notifications-secret Secret
# (created by Terraform). This ConfigMap references it via $slack-token.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ── Slack service config ────────────────────────────────────────────────────
  # $slack-token resolves from the argocd-notifications-secret Secret.
  service.slack: |
    token: $slack-token
    username: ArgoCD
    icon: ":argo:"

  # ── Notification templates ──────────────────────────────────────────────────

  template.app-sync-succeeded: |
    slack:
      attachments: |
        [{
          "color": "#18be52",
          "title": "✅ Sync succeeded — {{ .app.metadata.name }}",
          "title_link": "{{.context.argocdUrl}}/applications/{{ .app.metadata.name }}",
          "fields": [
            {
              "title": "Environment",
              "value": "{{ .app.spec.destination.namespace }}",
              "short": true
            },
            {
              "title": "Revision",
              "value": "{{ .app.status.sync.revision | trunc 7 }}",
              "short": true
            },
            {
              "title": "App Version",
              "value": "{{ .app.status.summary.images | join \", \" }}",
              "short": false
            }
          ],
          "footer": "ArgoCD",
          "ts": {{ now | unixEpoch }}
        }]

  template.app-sync-failed: |
    slack:
      attachments: |
        [{
          "color": "#E96D76",
          "title": "❌ Sync FAILED — {{ .app.metadata.name }}",
          "title_link": "{{.context.argocdUrl}}/applications/{{ .app.metadata.name }}",
          "fields": [
            {
              "title": "Environment",
              "value": "{{ .app.spec.destination.namespace }}",
              "short": true
            },
            {
              "title": "Phase",
              "value": "{{ .app.status.operationState.phase }}",
              "short": true
            },
            {
              "title": "Error",
              "value": "{{ .app.status.operationState.message }}",
              "short": false
            }
          ],
          "footer": "ArgoCD",
          "ts": {{ now | unixEpoch }}
        }]

  template.app-health-degraded: |
    slack:
      attachments: |
        [{
          "color": "#f4c030",
          "title": "⚠️ Health DEGRADED — {{ .app.metadata.name }}",
          "title_link": "{{.context.argocdUrl}}/applications/{{ .app.metadata.name }}",
          "fields": [
            {
              "title": "Environment",
              "value": "{{ .app.spec.destination.namespace }}",
              "short": true
            },
            {
              "title": "Health",
              "value": "{{ .app.status.health.status }}",
              "short": true
            },
            {
              "title": "Message",
              "value": "{{ .app.status.health.message }}",
              "short": false
            }
          ],
          "footer": "ArgoCD",
          "ts": {{ now | unixEpoch }}
        }]

  template.app-out-of-sync: |
    slack:
      attachments: |
        [{
          "color": "#439FE0",
          "title": "🔄 OutOfSync — {{ .app.metadata.name }}",
          "title_link": "{{.context.argocdUrl}}/applications/{{ .app.metadata.name }}",
          "text": "Cluster has drifted from git. Manual sync required for production.",
          "fields": [
            {
              "title": "Environment",
              "value": "{{ .app.spec.destination.namespace }}",
              "short": true
            },
            {
              "title": "Revision",
              "value": "{{ .app.status.sync.revision | trunc 7 }}",
              "short": true
            }
          ],
          "footer": "ArgoCD",
          "ts": {{ now | unixEpoch }}
        }]

  # ── Triggers ────────────────────────────────────────────────────────────────
  # Each trigger defines: when to fire + which template to use.

  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  trigger.on-sync-status-unknown: |
    - when: app.status.sync.status == 'OutOfSync'
      oncePer: app.status.sync.revision
      send: [app-out-of-sync]

  # ── Default subscriptions ───────────────────────────────────────────────────
  # Any app that does NOT have per-app annotations will use these defaults.
  defaultTriggers: |
    - on-sync-failed
    - on-health-degraded

  # ── ArgoCD URL (used in notification links) ──────────────────────────────────
  context: |
    argocdUrl: http://localhost:8080   # replace with your real ArgoCD URL/ingress
