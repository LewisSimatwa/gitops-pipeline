{{/*
This template is intentionally opinionated to satisfy all three Kyverno ClusterPolicies
that will be enforced on the staging and production namespaces:

  1. require-resource-limits   → resources.requests + resources.limits are always set
  2. require-liveness-probe    → livenessProbe is always set
  3. require-non-root          → podSecurityContext.runAsNonRoot: true is always set

All three values come from values.yaml with safe defaults so the chart is
always policy-compliant before Kyverno is even installed.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "myapp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "myapp.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime rolling update
  template:
    metadata:
      labels:
        {{- include "myapp.selectorLabels" . | nindent 8 }}
      annotations:
        # Changing the ConfigMap forces a rolling restart automatically.
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "myapp.serviceAccountName" . }}

      # ── Pod-level security context ────────────────────────────────────────
      # Kyverno policy: require-non-root
      # runAsNonRoot at pod level is a default; containers can override to
      # a specific UID via containerSecurityContext.runAsUser.
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      # Prevent the scheduler from co-locating multiple replicas on the same node.
      # This is a "preferred" rule so scheduling is never blocked on a single-node cluster.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "myapp.selectorLabels" . | nindent 14 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Give pods 30s to finish in-flight requests before SIGKILL.
      terminationGracePeriodSeconds: 30

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # ── Container-level security context ─────────────────────────────
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}

          # ── Resource limits ───────────────────────────────────────────────
          # Kyverno policy: require-resource-limits
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Liveness probe ────────────────────────────────────────────────
          # Kyverno policy: require-liveness-probe
          # Kubernetes restarts the container if this fails failureThreshold times.
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}

          # ── Readiness probe ───────────────────────────────────────────────
          # Kubernetes stops sending traffic to this pod while this fails.
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

          # ── Environment variables ─────────────────────────────────────────
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # ── ConfigMap injection ───────────────────────────────────────────
          {{- if .Values.configMap.enabled }}
          envFrom:
            - configMapRef:
                name: {{ include "myapp.fullname" . }}-config
          {{- end }}

          # ── Temp dir (needed because rootFilesystem is read-only) ─────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
