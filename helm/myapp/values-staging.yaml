replicaCount: 1

image:
  repository: acrgitopsdemodev.azurecr.io/myapp
  tag: "latest"

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

# http-echo serves on whatever port you pass via -listen flag
# It handles any path with 200 OK — perfect for health checks
livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

# http-echo runs as non-root and needs no writable filesystem — fits perfectly
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: myapp-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  - name: PORT
    value: "8080"
  - name: APP_ENV
    value: "staging"
  - name: LOG_LEVEL
    value: "debug"
  - name: LOG_FORMAT
    value: "json"

autoscaling:
  enabled: false
podDisruptionBudget:
  enabled: false

args:
  - "-listen=:8080"
  - "-text=hello from staging"
