# ─────────────────────────────────────────────────────────────────────────────
# Production environment overrides.
# Merged on top of values.yaml by ArgoCD when deploying myapp-production.
#
# Philosophy for production:
#   - Multiple replicas for availability
#   - HPA for traffic-driven scaling
#   - PodDisruptionBudget to survive node upgrades
#   - Stricter resource limits (right-sized for actual load)
#   - Warn-level logging only (reduce noise and cost)
# ─────────────────────────────────────────────────────────────────────────────

replicaCount: 2

image:
  repository: acrgitopsdemodev.azurecr.io/myapp
  tag: "latest"

args:
  - "-listen=:8080"
  - "-text=hello from production"

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  - name: PORT
    value: "8080"
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "warn"
  - name: LOG_FORMAT
    value: "json"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - myapp
          topologyKey: kubernetes.io/hostname
