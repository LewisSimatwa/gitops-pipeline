# ─────────────────────────────────────────────────────────────────────────────
# Kyverno Helm values — used when installing Kyverno via Helm.
#
# Install command:
#   helm repo add kyverno https://kyverno.github.io/kyverno
#   helm repo update
#   helm install kyverno kyverno/kyverno \
#     --namespace kyverno \
#     --create-namespace \
#     --version 3.1.4 \
#     --values kyverno/kyverno-install.yaml \
#     --wait
#
# Then apply the ClusterPolicies:
#   kubectl apply -f kyverno/require-resource-limits.yaml
#   kubectl apply -f kyverno/require-liveness-probe.yaml
#   kubectl apply -f kyverno/require-non-root.yaml
#
# Verify policies are active:
#   kubectl get clusterpolicies
#
# Check for violations on existing resources:
#   kubectl get policyreport -A
#   kubectl get clusterpolicyreport
# ─────────────────────────────────────────────────────────────────────────────

# Run a single replica of each Kyverno component.
# For production, set replicaCount to 3 for HA.
admissionController:
  replicas: 1

backgroundController:
  replicas: 1

cleanupController:
  replicas: 1

reportsController:
  replicas: 1

# Kyverno webhook timeout. 10s is generous — reduce to 5s in production
# if admission latency is a concern.
webhookTimeout: 10

# Generate policy reports for existing resources in the cluster.
# This lets you audit compliance without blocking anything (enforcement
# is controlled by the validationFailureAction in each ClusterPolicy).
generateSuccessEvents: false

features:
  policyExceptions:
    # Allow policy exceptions to be created in any namespace.
    # Useful for granting temporary exemptions during migrations.
    enabled: true
    namespace: "*"
